protocol_slug: "vmware-vsphere"
orchestration_skill: "orchestrating-nerva-development"
created_at: "2026-02-26T00:00:00Z"
description: |
  VMware vSphere fingerprinting plugin for Nerva. Detects VMware ESXi,
  vCenter Server, and vSphere hosts by querying the vSphere SOAP API at
  /sdk with RetrieveServiceContent. Extracts vendor, product name,
  version, build number, API type, and generates product-specific CPEs.
  Differentiates ESXi (HostAgent) from vCenter (VirtualCenter) via apiType.

